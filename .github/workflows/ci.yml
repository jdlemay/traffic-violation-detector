name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        # The rule engine + geometry tests are pure logic and need only these;
        # the heavy vision/sensor deps are not required to run the test suite.
        run: pip install numpy pyyaml pytest
      - name: Run tests
        run: pytest -q
